<body>

<canvas id="canvas"></canvas>

<div class="container">
  <div class="buttons">
    <a href="https://onlyfans.com/againlux" target="_blank" class="button-33">Onlyfans🥵</a>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W, H, particles = [];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init(n){
    particles = [];
    for(var i = 0; i < n; i++){
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.4 + Math.random() * 1.2,
        vy: -0.15 - Math.random() * 0.35,
        vx: (Math.random() - 0.5) * 0.2,
        life: Math.random(),
        speed: 0.002 + Math.random() * 0.003
      });
    }
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    for(var i = 0; i < particles.length; i++){
      var p = particles[i];
      p.life += p.speed;
      if(p.life > 1) p.life = 0;
      p.y += p.vy;
      p.x += p.vx;
      if(p.y < -5){ p.y = H + 5; p.x = Math.random() * W; }
      var alpha = Math.sin(p.life * Math.PI) * 0.45;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  init(50);
  draw();
  window.addEventListener('resize', function(){ resize(); init(50); });
})();
</script>
